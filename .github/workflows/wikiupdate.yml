---
# RISC OS 64 update of Wiki for information
#
# The Wiki is updated with the changes from the status in the repository.
#

name: Wiki update

# Controls when the action will run. Triggers the workflow on:
#   * push on master.
on:
  push:
    branches: ["master", "wiki-update-pngs"]

concurrency:
  # Be nice to the build service and only submit a single job at a time.
  group: wiki-update
  cancel-in-progress: false

jobs:
  wiki:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: Install Wiki image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libjson-perl openssh-client sshpass
          utils/mmdc --pull

      - name: Restore Mermaid image cache
        uses: actions/cache@v4
        with:
          path: .mermaid-cache
          key: mermaid-images-${{ runner.os }}-${{ hashFiles('planning/**/*.md', 'planning/**/*.mmd', 'features/**/*.md', 'Status.md', 'utils/*.pl') }}
          restore-keys: |
            mermaid-images-${{ runner.os }}-

      - name: Build all the documents
        env:
          WIKI_IMAGE_BASE_URL: ${{ secrets.WIKI_IMAGE_BASE_URL }}
          WIKI_IMAGE_CACHE_DIR: .mermaid-cache
        run: |
          if [ -z "$WIKI_IMAGE_BASE_URL" ]; then
            echo "::error::WIKI_IMAGE_BASE_URL must be set to the public URL for update-images"
            exit 1
          fi
          make all

      - name: Report on progress statistics
        run: |
          echo '# Progress statistics' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          cat statistics.md >> $GITHUB_STEP_SUMMARY
          cp statistics.md wiki-update/Statistics.md

      - name: Report on progress of phase 1
        run: |
          echo >> $GITHUB_STEP_SUMMARY
          echo '---' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo '# Progress of phase 1' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo '```mermaid' >> $GITHUB_STEP_SUMMARY
          cat planning/Phase-1.mmd >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY

      - name: Upload Wiki images
        env:
          WIKI_IMAGE_SFTP_DEST: ${{ secrets.WIKI_IMAGE_SFTP_DEST }}
          WIKI_IMAGE_SFTP_PASSWORD: ${{ secrets.WIKI_IMAGE_SFTP_PASSWORD }}
        run: |
          if [ ! -s update-images/upload-files.txt ]; then
            echo "No new Wiki images to upload"
            exit 0
          fi

          if [ -z "$WIKI_IMAGE_SFTP_DEST" ]; then
            echo "::error::WIKI_IMAGE_SFTP_DEST must be set to the SFTP destination for update-images"
            exit 1
          fi
          if [ -z "$WIKI_IMAGE_SFTP_PASSWORD" ]; then
            echo "::error::WIKI_IMAGE_SFTP_PASSWORD must be set to the SFTP account password"
            exit 1
          fi

          sed 's/^/put /' update-images/upload-files.txt > sftp-update-images.txt

          SSHPASS="$WIKI_IMAGE_SFTP_PASSWORD" sshpass -e sftp \
            -o "BatchMode=no" \
            -o "PreferredAuthentications=password" \
            -o "PubkeyAuthentication=no" \
            -o "StrictHostKeyChecking=no" \
            -b sftp-update-images.txt \
            "$WIKI_IMAGE_SFTP_DEST"

          mkdir -p .mermaid-cache
          {
            [ ! -f .mermaid-cache/uploaded-images.txt ] || cat .mermaid-cache/uploaded-images.txt
            xargs -n 1 basename < update-images/upload-files.txt
          } | sort -u > .mermaid-cache/uploaded-images.new
          mv .mermaid-cache/uploaded-images.new .mermaid-cache/uploaded-images.txt

      # See: https://github.com/marketplace/actions/wiki-page-creator-action
      - name: Upload documents to Wiki
        uses: docker://decathlon/wiki-page-creator-action:latest
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ACTION_MAIL: gerph@gerph.org
          ACTION_NAME: Charles Ferguson
          OWNER: gerph
          REPO_NAME: riscos64-status
          MD_FOLDER: wiki-update

      - uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: RISC OS 64 Progress
          path: |
            statistics*
            plan*.*
            planning/*.mmd
            planning/*.svg
            update-images/*.png

      # https://github.com/marketplace/actions/deploy-to-gist
      - name: Upload percentages as gists (Phase 1)
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_PAT }}
          gist_id: c26e8457269506554ec1f7533d2f9aed
          gist_file_name: Progress-1.svg
          file_path: planning/Progress-1.svg
          file_type: text

      - name: Sleep to prevent races
        run: |
          sleep 4

      - name: Upload percentages as gists (Phase 2)
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_PAT }}
          gist_id: c26e8457269506554ec1f7533d2f9aed
          gist_file_name: Progress-2.svg
          file_path: planning/Progress-2.svg
          file_type: text

      - name: Sleep to prevent races
        run: |
          sleep 4

      - name: Upload percentages as gists (Phase 3)
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_PAT }}
          gist_id: c26e8457269506554ec1f7533d2f9aed
          gist_file_name: Progress-3.svg
          file_path: planning/Progress-3.svg
          file_type: text

      - name: Sleep to prevent races
        run: |
          sleep 4

      - name: Upload percentages as gists (Phase 4)
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_PAT }}
          gist_id: c26e8457269506554ec1f7533d2f9aed
          gist_file_name: Progress-4.svg
          file_path: planning/Progress-4.svg
          file_type: text

      - name: Sleep to prevent races
        run: |
          sleep 4

      - name: Upload percentages as gists (Phase 5)
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_PAT }}
          gist_id: c26e8457269506554ec1f7533d2f9aed
          gist_file_name: Progress-5.svg
          file_path: planning/Progress-5.svg
          file_type: text

      - name: Sleep to prevent races
        run: |
          sleep 4

      - name: Upload percentages as gists (Phase 6)
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_PAT }}
          gist_id: c26e8457269506554ec1f7533d2f9aed
          gist_file_name: Progress-6.svg
          file_path: planning/Progress-6.svg
          file_type: text

      - name: Sleep to prevent races
        run: |
          sleep 4

      - name: Upload percentages as gists (Phase 7)
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_PAT }}
          gist_id: c26e8457269506554ec1f7533d2f9aed
          gist_file_name: Progress-7.svg
          file_path: planning/Progress-7.svg
          file_type: text
